<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sportlive — Offline</title>
<style>
  body { margin: 0; padding: 0; min-height: 100vh; display: grid; place-items: center; font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #fff; }
  .card { text-align: center; padding: 48px 24px; max-width: 480px; }
  .mark { display: inline-flex; width: 64px; height: 64px; align-items: center; justify-content: center; border-radius: 12px; background: #dc2626; font-size: 28px; font-weight: 800; margin-bottom: 24px; }
  h1 { font-size: 28px; margin: 0 0 12px; }
  p { color: #a3a3a3; line-height: 1.5; margin: 0 0 24px; }
  button { background: #dc2626; color: #fff; border: 0; padding: 12px 24px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; }
  button:hover { background: #ef4444; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">SL</div>
    <h1>Aloqa yo'q</h1>
    <p>Internet ulanmagan. Aloqa qaytsa, sahifa yangilanadi.</p>
    <button onclick="location.reload()">Qayta urinib ko'rish</button>
  </div>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
