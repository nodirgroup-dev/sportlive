name: sportlive-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: sportlive-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: sportlive
      POSTGRES_PASSWORD: sportlive
      POSTGRES_DB: sportlive
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: Asia/Tashkent
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - sportlive_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportlive -d sportlive"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  sportlive_pg_data:
